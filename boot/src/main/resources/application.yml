environment: localhost
server:
  port: 9090
  servlet:
    context-path: /authsox
spring:
  kafka:
      bootstrap-servers: localhost:9092
  datasource:
    url: jdbc:postgresql://localhost:5433/AUTHS_SOX
    username: postgres
    password: postgres-pwd
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl: update
auth:
  tokens:
    issuer: athssox
    access-token-ttl-seconds: 3600
    refresh-token-ttl-seconds: 2592000
    email-verification-token-ttl-seconds: 86400
    jwt:
      alg: RS256
      key-id: ${AUTH_JWT_KEY_ID:local-dev}
      key-store:
        path: ${AUTH_JWT_KEY_STORE_PATH:}
        password: ${AUTH_JWT_KEY_STORE_PASSWORD:}
        alias: ${AUTH_JWT_KEY_STORE_ALIAS:}
        key-password: ${AUTH_JWT_KEY_STORE_KEY_PASSWORD:}
      pem:
        private-key-path: ${AUTH_JWT_PRIVATE_KEY_PATH:./keys/jwt-private.pem}
        public-key-path: ${AUTH_JWT_PUBLIC_KEY_PATH:./keys/jwt-public.pem}
        private-key: ${AUTH_JWT_PRIVATE_KEY:}
        public-key: ${AUTH_JWT_PUBLIC_KEY:}
  session:
    last-used-throttle-minutes: 5
  cleanup:
    enabled: true
    cron: "0 0 0 * * *"
    zone: Europe/Kiev
    refresh-tokens:
      retention-days: 14
    email-verification-tokens:
      retention-days: 2
    outbox-events:
      retention-days: 14
    device-sessions:
      retention-days: 0
bff:
  base-url: http://localhost:8080/bffssox
outbox:
  worker:
    poll-delay-ms: 5000
    batch-size: 50
    retry-delay-seconds: 60
    max-retries: 5

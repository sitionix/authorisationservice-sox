environment: localhost
server:
  port: 9090
  servlet:
    context-path: /authsox
  tomcat:
    max-http-form-post-size: 32KB
    max-swallow-size: 32KB
    connection-timeout: 5s
spring:
  kafka:
      bootstrap-servers: localhost:9092
  datasource:
    url: jdbc:postgresql://localhost:5433/AUTHS_SOX
    username: postgres
    password: postgres-pwd
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl: update
security:
  trusted-proxy: false
auth:
  request-limits:
    max-body-size: 16KB
    email-max-length: 254
    password-max-length: 128
    session-source-id-max-length: 64
  tokens:
    issuer: athssox
    access-token-ttl-seconds: 3600
    refresh-token-ttl-seconds: 2592000
    email-verification-token-ttl-seconds: 86400
    jwt:
      alg: RS256
      key-id: ${AUTH_JWT_KEY_ID:local-dev}
      key-store:
        path: ${AUTH_JWT_KEY_STORE_PATH:}
        password: ${AUTH_JWT_KEY_STORE_PASSWORD:}
        alias: ${AUTH_JWT_KEY_STORE_ALIAS:}
        key-password: ${AUTH_JWT_KEY_STORE_KEY_PASSWORD:}
      pem:
        private-key-path: ${AUTH_JWT_PRIVATE_KEY_PATH:./keys/jwt-private.pem}
        public-key-path: ${AUTH_JWT_PUBLIC_KEY_PATH:./keys/jwt-public.pem}
        private-key: ${AUTH_JWT_PRIVATE_KEY:}
        public-key: ${AUTH_JWT_PUBLIC_KEY:}
  session:
    last-used-throttle-minutes: 5
  rate-limit:
    enabled: true
    login:
      ip:
        limit: 20
        window: 5m
      email:
        limit: 5
        window: 5m
      ip-session:
        limit: 10
        window: 5m
    register:
      ip:
        limit: 10
        window: 15m
      email:
        limit: 3
        window: 15m
      ip-email:
        limit: 3
        window: 15m
    resend:
      ip:
        limit: 10
        window: 15m
      email:
        limit: 3
        window: 15m
      ip-email:
        limit: 3
        window: 15m
    refresh:
      ip:
        limit: 60
        window: 5m
      session:
        limit: 30
        window: 5m
      ip-session:
        limit: 30
        window: 5m
bff:
  base-url: http://localhost:8080/bffssox
outbox:
  worker:
    poll-delay-ms: 5000
    batch-size: 50
    retry-delay-seconds: 60
    max-retries: 5

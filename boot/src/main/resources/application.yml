environment: localhost
server:
  port: 9090
  servlet:
    context-path: /authsox
spring:
  kafka:
      bootstrap-servers: localhost:9092
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
management:
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  endpoints:
    web:
      exposure:
        include: "health,info"
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
auth:
  tokens:
    issuer: athssox
    access-token-ttl-seconds: 3600
    refresh-token-ttl-seconds: 2592000
    email-verification-token-ttl-seconds: 86400
    jwt:
      alg: RS256
      key-id: ${AUTH_JWT_KEY_ID:local-dev}
      key-store:
        path: ${AUTH_JWT_KEY_STORE_PATH:}
        password: ${AUTH_JWT_KEY_STORE_PASSWORD:}
        alias: ${AUTH_JWT_KEY_STORE_ALIAS:}
        key-password: ${AUTH_JWT_KEY_STORE_KEY_PASSWORD:}
      pem:
        private-key-path: ${AUTH_JWT_PRIVATE_KEY_PATH:./keys/jwt-private.pem}
        public-key-path: ${AUTH_JWT_PUBLIC_KEY_PATH:./keys/jwt-public.pem}
        private-key: ${AUTH_JWT_PRIVATE_KEY:}
        public-key: ${AUTH_JWT_PUBLIC_KEY:}
    jwks:
      cache-seconds: 300
  session:
    last-used-throttle-minutes: 5
security:
  email-verification:
    hmac-secret: ${SECURITY_EMAIL_VERIFICATION_HMAC_SECRET:}
forge:
  outbox:
    domain-store: POSTGRES
  security:
    service-id: sitionixAuth
    dev:
      jwt-secret: ${FORGE_SECURITY_DEV_JWT_SECRET:dev-internal-auth-secret}
      issuer: ${FORGE_SECURITY_DEV_ISSUER:sitionix-internal}
      ttl-seconds: ${FORGE_SECURITY_DEV_TTL_SECONDS:300}
    policies:
      sitionixNotification:
        allow:
          - GET /api/v1/auth/emailVerificationTokens/*:issueLink
      sitionixBff:
        allow:
          - "*"
    server:
      excludes:
        - "/.well-known/jwks.json"
        - "/oauth2/v1/keys"
        - "/actuator/health"
        - "/actuator/health/readiness"
        - "/actuator/health/liveness"

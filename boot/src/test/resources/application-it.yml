security:
  email-verification:
    hmac-secret: it-email-token-secret
forge:
  outbox:
    worker:
      enabled: false
    cleanup:
      enabled: false
  security:
    service-id: sitionixAuth
    dev:
      jwt-secret: dev-internal-auth-secret
      issuer: sitionix-internal
      ttl-seconds: 300
    policies:
      sitionixNotification:
        allow:
          - GET /api/v1/auth/emailVerificationTokens/*:issueLink
      sitionixBff:
        allow:
          - "*"
    server:
      excludes:
        - "/.well-known/jwks.json"
        - "/oauth2/v1/keys"

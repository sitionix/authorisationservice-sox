name: DB Migrate On Comment

on:
  issue_comment:
    types:
      - created

permissions:
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.resolve.outputs.enabled }}
      environment_id: ${{ steps.resolve.outputs.environment_id }}
      github_environment: ${{ steps.resolve.outputs.github_environment }}
      summary: ${{ steps.resolve.outputs.summary }}
      checkout_ref: ${{ steps.checkout_ref.outputs.value }}
      issue_number: ${{ steps.issue_number.outputs.value }}
      pr_head_ref: ${{ steps.pr.outputs.head_ref }}
      database_name: ${{ steps.resolve.outputs.database_name }}
      flyway_url_var_name: ${{ steps.resolve.outputs.flyway_url_var_name }}
      flyway_username_var_name: ${{ steps.resolve.outputs.flyway_username_var_name }}
      flyway_password_secret_name: ${{ steps.resolve.outputs.flyway_password_secret_name }}
      auth_token_secret_name: ${{ steps.resolve.outputs.auth_token_secret_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Read pull request metadata
        id: pr
        if: github.event.issue.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            core.setOutput("head_ref", pr.data.head.ref);
            core.setOutput("head_sha", pr.data.head.sha);
            core.setOutput(
              "same_repo",
              pr.data.head.repo.full_name === `${context.repo.owner}/${context.repo.repo}` ? "true" : "false"
            );

      - name: Checkout pull request head for config resolution
        if: github.event.issue.pull_request && steps.pr.outputs.same_repo == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_sha }}

      - name: Resolve migration target
        id: resolve
        shell: bash
        env:
          DEPLOY_EVENT_NAME: issue_comment
          DEPLOY_COMMENT_BODY: ${{ github.event.comment.body }}
          DEPLOY_IS_PULL_REQUEST: ${{ github.event.issue.pull_request && 'true' || 'false' }}
        run: |
          ruby - <<'INNER_RUBY'
          require "yaml"
          require "shellwords"
          require "pathname"

          output_path = Pathname.new(ENV.fetch("GITHUB_OUTPUT"))

          def emit(output_path, key, value)
            output_path.open("a") do |handle|
              handle.puts("#{key}=#{value}")
            end
          end

          if ENV.fetch("DEPLOY_EVENT_NAME") != "issue_comment"
            emit(output_path, "enabled", "false")
            emit(output_path, "reason", "Unsupported event #{ENV.fetch('DEPLOY_EVENT_NAME')}")
            exit 0
          end

          if ENV.fetch("DEPLOY_IS_PULL_REQUEST") != "true"
            emit(output_path, "enabled", "false")
            emit(output_path, "reason", "Comment migration is supported only on pull requests")
            exit 0
          end

          workspace = Pathname.new(ENV.fetch("GITHUB_WORKSPACE"))
          model = YAML.load_file(workspace.join("db-migration/db-model.yaml"))
          db = model.fetch("db")
          trigger = db.fetch("trigger")
          environments = db.fetch("environments")

          comment_body = ENV.fetch("DEPLOY_COMMENT_BODY", "")
          first_non_empty_line = comment_body.each_line.map(&:strip).find { |line| !line.empty? }
          if first_non_empty_line.nil?
            emit(output_path, "enabled", "false")
            emit(output_path, "reason", "Comment does not match deployment command")
            exit 0
          end

          begin
            tokens = Shellwords.split(first_non_empty_line)
          rescue ArgumentError => error
            abort("Malformed deployment comment: #{error.message}")
          end

          if tokens.empty? || tokens[0] != trigger.fetch("command")
            emit(output_path, "enabled", "false")
            emit(output_path, "reason", "Comment does not match deployment command")
            exit 0
          end

          if tokens.length < 2 || tokens[1] != trigger.fetch("target_type")
            missing = tokens.length > 1 ? tokens[1] : "<missing>"
            abort("Unsupported deploy target type: #{missing}")
          end

          values = {}
          index = 2
          while index < tokens.length
            option = tokens[index]
            abort("Unsupported argument: #{option}") unless ["--name", "--env"].include?(option)
            abort("Missing value for #{option}") if index + 1 >= tokens.length || tokens[index + 1].start_with?("--")
            abort("Duplicate argument: #{option}") if values.key?(option)
            values[option] = tokens[index + 1]
            index += 2
          end

          database_name = values["--name"]
          environment_id = values["--env"]
          abort("Migration comment must include --name <database>") if database_name.nil? || database_name.empty?
          abort("Migration comment must include --env <environment>") if environment_id.nil? || environment_id.empty?
          abort("Unknown database name: #{database_name}") unless database_name == db.fetch("name")

          environment = environments[environment_id]
          abort("Unknown migration environment: #{environment_id}") if environment.nil?

          connection = environment.fetch("connection")
          build = environment.fetch("build")

          emit(output_path, "enabled", "true")
          emit(output_path, "database_name", database_name)
          emit(output_path, "environment_id", environment_id)
          emit(output_path, "github_environment", environment.fetch("github_environment", environment_id))
          emit(output_path, "flyway_url_var_name", connection.fetch("url_var"))
          emit(output_path, "flyway_username_var_name", connection.fetch("username_var"))
          emit(output_path, "flyway_password_secret_name", connection.fetch("password_secret"))
          emit(output_path, "auth_token_secret_name", build.fetch("auth_token_secret"))
          emit(output_path, "summary", "#{database_name} -> #{environment_id}")
          INNER_RUBY

      - name: Reject fork-based PR migration runs
        if: steps.resolve.outputs.enabled == 'true' && steps.pr.outputs.same_repo != 'true'
        run: |
          echo "PR comment migrations are allowed only for branches in this repository." >&2
          exit 1

      - name: Compute checkout ref
        id: checkout_ref
        run: |
          if [[ "${{ steps.resolve.outputs.enabled }}" == "true" ]]; then
            echo "value=${{ steps.pr.outputs.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

      - name: Capture issue number
        id: issue_number
        run: |
          if [[ "${{ steps.resolve.outputs.enabled }}" == "true" ]]; then
            echo "value=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=" >> "$GITHUB_OUTPUT"
          fi

  migrate:
    needs: resolve
    if: needs.resolve.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.github_environment }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Post start comment
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number("${{ needs.resolve.outputs.issue_number }}");
            const workflowRunUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = [
              "---",
              "### DB migration started",
              "",
              `- Target: ${{ needs.resolve.outputs.summary }}`,
              `- Branch: ${{ needs.resolve.outputs.pr_head_ref }}`,
              `- Workflow: ${workflowRunUrl}`,
              "---",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

      - name: Execute migration
        uses: ./.github/actions/db-migrate-run
        with:
          environment_id: ${{ needs.resolve.outputs.environment_id }}
          github_environment: ${{ needs.resolve.outputs.github_environment }}
          database_name: ${{ needs.resolve.outputs.database_name }}
        env:
          AUTH_TOKEN: ${{ secrets[needs.resolve.outputs.auth_token_secret_name] }}
          FLYWAY_URL: ${{ vars[needs.resolve.outputs.flyway_url_var_name] }}
          FLYWAY_USERNAME: ${{ vars[needs.resolve.outputs.flyway_username_var_name] }}
          FLYWAY_PASSWORD: ${{ secrets[needs.resolve.outputs.flyway_password_secret_name] }}

      - name: Post success comment
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number("${{ needs.resolve.outputs.issue_number }}");
            const body = [
              "---",
              "### DB migration succeeded",
              "",
              `- Target: ${{ needs.resolve.outputs.summary }}`,
              `- GitHub Environment: ${{ needs.resolve.outputs.github_environment }}`,
              "---",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

      - name: Post failure comment
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = Number("${{ needs.resolve.outputs.issue_number }}");
            const workflowRunUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const body = [
              "---",
              "### DB migration failed",
              "",
              `- Target: ${{ needs.resolve.outputs.summary }}`,
              `- Workflow: ${workflowRunUrl}`,
              "---",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });

name: DB Migrate Resolve
description: Resolve a DB migration target from the trigger comment and db model.

inputs:
  comment_body:
    description: Pull request comment body that triggered the workflow.
    required: true
  is_pull_request:
    description: Whether the GitHub event targets a pull request.
    required: true
  model_path:
    description: Path to the db migration model file.
    required: false
    default: db-migration/db-model.yaml

outputs:
  enabled:
    description: Whether the comment matches the DB migration contract.
    value: ${{ steps.resolve.outputs.enabled }}
  environment_id:
    description: Target environment selected by the trigger comment.
    value: ${{ steps.resolve.outputs.environment_id }}
  database_name:
    description: Canonical database name selected by the trigger comment.
    value: ${{ steps.resolve.outputs.database_name }}
  database_url:
    description: Flyway JDBC URL resolved from the db model.
    value: ${{ steps.resolve.outputs.database_url }}
  database_username:
    description: Flyway username resolved from the db model.
    value: ${{ steps.resolve.outputs.database_username }}
  database_password_secret_name:
    description: GitHub secret name that holds the Flyway password.
    value: ${{ steps.resolve.outputs.database_password_secret_name }}
  tunnel_local_port:
    description: Local port for an optional SSH tunnel.
    value: ${{ steps.resolve.outputs.tunnel_local_port }}
  tunnel_remote_host:
    description: Remote host for an optional SSH tunnel.
    value: ${{ steps.resolve.outputs.tunnel_remote_host }}
  tunnel_remote_port:
    description: Remote port for an optional SSH tunnel.
    value: ${{ steps.resolve.outputs.tunnel_remote_port }}
  summary:
    description: Short human-readable migration target summary.
    value: ${{ steps.resolve.outputs.summary }}
  reason:
    description: Reason why the command was ignored.
    value: ${{ steps.resolve.outputs.reason }}

runs:
  using: composite
  steps:
    - name: Resolve migration target
      id: resolve
      shell: bash
      env:
        INPUT_COMMENT_BODY: ${{ inputs.comment_body }}
        INPUT_IS_PULL_REQUEST: ${{ inputs.is_pull_request }}
        INPUT_MODEL_PATH: ${{ inputs.model_path }}
      run: |
        ruby - <<'INNER_RUBY'
        require "yaml"
        require "shellwords"
        require "pathname"

        output_path = Pathname.new(ENV.fetch("GITHUB_OUTPUT"))

        def emit(output_path, key, value)
          output_path.open("a") do |handle|
            handle.puts("#{key}=#{value}")
          end
        end

        if ENV.fetch("INPUT_IS_PULL_REQUEST") != "true"
          emit(output_path, "enabled", "false")
          emit(output_path, "reason", "Comment migration is supported only on pull requests")
          exit 0
        end

        workspace = Pathname.new(ENV.fetch("GITHUB_WORKSPACE"))
        model = YAML.load_file(workspace.join(ENV.fetch("INPUT_MODEL_PATH")))
        database = model.fetch("database")
        environments = database.fetch("environments")

        comment_body = ENV.fetch("INPUT_COMMENT_BODY", "")
        first_non_empty_line = comment_body.each_line.map(&:strip).find { |line| !line.empty? }
        if first_non_empty_line.nil?
          emit(output_path, "enabled", "false")
          emit(output_path, "reason", "Comment does not match deployment command")
          exit 0
        end

        begin
          tokens = Shellwords.split(first_non_empty_line)
        rescue ArgumentError => error
          abort("Malformed deployment comment: #{error.message}")
        end

        if tokens.empty? || tokens[0] != "/deploy"
          emit(output_path, "enabled", "false")
          emit(output_path, "reason", "Comment does not match deployment command")
          exit 0
        end

        if tokens.length < 2 || tokens[1] != "db"
          emit(output_path, "enabled", "false")
          emit(output_path, "reason", "Comment does not match DB migration command")
          exit 0
        end

        values = {}
        index = 2
        while index < tokens.length
          option = tokens[index]
          abort("Unsupported argument: #{option}") unless ["--name", "--env"].include?(option)
          abort("Missing value for #{option}") if index + 1 >= tokens.length || tokens[index + 1].start_with?("--")
          abort("Duplicate argument: #{option}") if values.key?(option)
          values[option] = tokens[index + 1]
          index += 2
        end

        database_name = values["--name"]
        environment_id = values["--env"]
        abort("Migration comment must include --name <database>") if database_name.nil? || database_name.empty?
        abort("Migration comment must include --env <environment>") if environment_id.nil? || environment_id.empty?
        abort("Unknown database name: #{database_name}") unless database_name == database.fetch("name")

        environment = environments[environment_id]
        abort("Unknown migration environment: #{environment_id}") if environment.nil?

        emit(output_path, "enabled", "true")
        emit(output_path, "database_name", database_name)
        emit(output_path, "environment_id", environment_id)
        emit(output_path, "database_url", environment.fetch("url"))
        emit(output_path, "database_username", environment.fetch("username"))
        emit(output_path, "database_password_secret_name", environment.fetch("password_secret_name"))
        tunnel = environment["tunnel"] || {}
        emit(output_path, "tunnel_local_port", tunnel.fetch("local_port", ""))
        emit(output_path, "tunnel_remote_host", tunnel.fetch("remote_host", ""))
        emit(output_path, "tunnel_remote_port", tunnel.fetch("remote_port", ""))
        emit(output_path, "summary", "#{database_name} -> #{environment_id}")
        INNER_RUBY

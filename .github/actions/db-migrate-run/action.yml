name: DB Migrate Run
description: Run Flyway migrations inside an environment-bound job.

inputs:
  environment_id:
    description: Logical migration environment selected by the trigger comment.
    required: true
  database_name:
    description: Canonical database name for the migration target.
    required: true

runs:
  using: composite
  steps:
    - name: Validate migration inputs
      shell: bash
      run: |
        for key in FLYWAY_URL FLYWAY_USERNAME FLYWAY_PASSWORD; do
          if [[ -z "${!key:-}" ]]; then
            echo "Missing required migration configuration: ${key}" >&2
            exit 1
          fi
        done

        tunnel_keys=(SSH_TUNNEL_LOCAL_PORT SSH_TUNNEL_REMOTE_HOST SSH_TUNNEL_REMOTE_PORT)
        tunnel_enabled=false
        for key in "${tunnel_keys[@]}"; do
          if [[ -n "${!key:-}" ]]; then
            tunnel_enabled=true
            break
          fi
        done

        if [[ "${tunnel_enabled}" == "true" ]]; then
          for key in DEPLOY_VM_HOST DEPLOY_VM_USER DEPLOY_VM_SSH_PRIVATE_KEY "${tunnel_keys[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              echo "Missing required SSH tunnel configuration: ${key}" >&2
              exit 1
            fi
          done
        fi

    - name: Show Flyway target
      shell: bash
      env:
        INPUT_DATABASE_NAME: ${{ inputs.database_name }}
        INPUT_ENVIRONMENT_ID: ${{ inputs.environment_id }}
      run: |
        echo "Running DB migration for ${INPUT_DATABASE_NAME} in ${INPUT_ENVIRONMENT_ID}"
        echo "Flyway connection is configured from db-migration/db-model.yaml via environment vars/secrets"

    - name: Execute Flyway lifecycle
      shell: bash
      run: |
        workspace_path="${GITHUB_WORKSPACE:?}"
        migration_sql_path="${workspace_path}/db-migration"

        if [[ ! -d "${migration_sql_path}" ]]; then
          echo "Missing Flyway migration directory: ${migration_sql_path}" >&2
          exit 1
        fi

        flyway_docker=(
          docker run --rm --network host
          -v "${migration_sql_path}:/flyway/sql:ro"
          flyway/flyway:10.10.0
          -url="${FLYWAY_URL}"
          -user="${FLYWAY_USERNAME}"
          -password="${FLYWAY_PASSWORD}"
        )

        tunnel_pid=""
        key_path=~/.ssh/db-migrate

        cleanup() {
          if [[ -n "${tunnel_pid}" ]]; then
            kill "${tunnel_pid}" 2>/dev/null || true
            wait "${tunnel_pid}" 2>/dev/null || true
          fi
          rm -f "${key_path}"
        }

        trap cleanup EXIT

        if [[ -n "${SSH_TUNNEL_LOCAL_PORT:-}" ]]; then
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_VM_SSH_PRIVATE_KEY}" > "${key_path}"
          chmod 600 "${key_path}"

          ssh \
            -i "${key_path}" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ExitOnForwardFailure=yes \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -N \
            -L "${SSH_TUNNEL_LOCAL_PORT}:${SSH_TUNNEL_REMOTE_HOST}:${SSH_TUNNEL_REMOTE_PORT}" \
            "${DEPLOY_VM_USER}@${DEPLOY_VM_HOST}" &
          tunnel_pid=$!

          for _ in $(seq 1 20); do
            if bash -c ">/dev/tcp/127.0.0.1/${SSH_TUNNEL_LOCAL_PORT}" 2>/dev/null; then
              break
            fi
            sleep 1
          done

          if ! bash -c ">/dev/tcp/127.0.0.1/${SSH_TUNNEL_LOCAL_PORT}" 2>/dev/null; then
            echo "SSH tunnel did not become ready on 127.0.0.1:${SSH_TUNNEL_LOCAL_PORT}" >&2
            exit 1
          fi
        fi

        "${flyway_docker[@]}" validate
        "${flyway_docker[@]}" migrate
        "${flyway_docker[@]}" info
